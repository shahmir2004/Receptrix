<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="ic-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#110826"/>
      <stop offset="55%"  stop-color="#090612"/>
      <stop offset="100%" stop-color="#06060b"/>
    </linearGradient>

    <!-- Bolt: light lavender at apex → vibrant purple mid → deep violet base -->
    <linearGradient id="ic-bolt" x1="256" y1="72" x2="256" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f5f0ff"/>
      <stop offset="28%"  stop-color="#bc8aff"/>
      <stop offset="62%"  stop-color="#863bff"/>
      <stop offset="100%" stop-color="#4c00af"/>
    </linearGradient>

    <!-- Border shimmer: purple → cyan → purple -->
    <linearGradient id="ic-border" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#863bff" stop-opacity="0.55"/>
      <stop offset="48%"  stop-color="#47bfff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#863bff" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Soft bloom for background glow layers -->
    <filter id="ic-bloom" x="-70%" y="-70%" width="240%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="32"/>
    </filter>

    <!-- Sharp glow composited onto the bolt -->
    <filter id="ic-bolt-glow" x="-18%" y="-12%" width="136%" height="124%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="88" fill="url(#ic-bg)"/>

  <!-- Glow layers (back to front) -->

  <!-- Deep violet base bloom -->
  <ellipse cx="256" cy="290" rx="195" ry="145" fill="#4a00b0" opacity="0.38" filter="url(#ic-bloom)"/>

  <!-- Primary purple bloom -->
  <ellipse cx="256" cy="310" rx="150" ry="110" fill="#7e14ff" opacity="0.50" filter="url(#ic-bloom)"/>

  <!-- Cyan accent — upper-right spark -->
  <ellipse cx="368" cy="152" rx="88" ry="54" fill="#47bfff" opacity="0.18" filter="url(#ic-bloom)"/>

  <!-- Subtle lavender top-centre highlight -->
  <ellipse cx="256" cy="120" rx="80" ry="48" fill="#c8aaff" opacity="0.14" filter="url(#ic-bloom)"/>

  <!-- Bolt mark — scale=8 → 384×368 px, centred in 512×512 at (64, 72) -->
  <g transform="translate(64, 72) scale(8)" filter="url(#ic-bolt-glow)">
    <path
      fill="url(#ic-bolt)"
      d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"
    />
  </g>

  <!-- Border shimmer ring -->
  <rect width="512" height="512" rx="88" fill="none" stroke="url(#ic-border)" stroke-width="1.5"/>
</svg>
