<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="receptrix-icon-title">
  <title id="receptrix-icon-title">Receptrix icon</title>
  <defs>
    <linearGradient id="rx-bg" x1="48" y1="32" x2="464" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15112B"/>
      <stop offset="0.5" stop-color="#07070D"/>
      <stop offset="1" stop-color="#020204"/>
    </linearGradient>
    <radialGradient id="rx-bloom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(272 288) rotate(90) scale(210 230)">
      <stop offset="0" stop-color="#6D28D9" stop-opacity="0.72"/>
      <stop offset="0.58" stop-color="#4F46E5" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#020204" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rx-stroke" x1="132" y1="96" x2="392" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4F0FF"/>
      <stop offset="0.4" stop-color="#8B5CF6"/>
      <stop offset="0.72" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="rx-border" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.52"/>
      <stop offset="0.5" stop-color="#22D3EE" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0.14"/>
    </linearGradient>
    <filter id="rx-mark-glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="92" fill="url(#rx-bg)"/>
  <rect width="512" height="512" rx="92" fill="url(#rx-bloom)"/>
  <circle cx="378" cy="142" r="76" fill="#22D3EE" opacity="0.12"/>
  <circle cx="174" cy="378" r="118" fill="#8B5CF6" opacity="0.16"/>

