      fill="none"
      stroke="url(#rx-stroke)"
      stroke-width="44"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M238 260l136 118"
      fill="none"
      stroke="url(#rx-stroke)"
