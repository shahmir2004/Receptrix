    />
    <path
      d="M33 34l29 25"
      fill="none"
      stroke="url(#rx-mark)"
      stroke-width="8"
      stroke-linecap="round"
    />
    <path
      d="M46 18c7.7 3.8 12.6 11.3 12.6 19.6"
      fill="none"
      stroke="#A5B4FC"
      stroke-width="3.5"
      stroke-linecap="round"
      opacity="0.85"
    />
    <path
      d="M65 22c7.5 7.7 7.5 20.2 0 27.9"
      fill="none"
      stroke="#22D3EE"
      stroke-width="3.5"
      stroke-linecap="round"
      opacity="0.78"
    />
  </g>

  <text
    x="86"
    y="47"
    fill="url(#rx-word)"
