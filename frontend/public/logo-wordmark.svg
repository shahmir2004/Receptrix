<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 316 72" role="img" aria-labelledby="receptrix-logo-title">
  <title id="receptrix-logo-title">Receptrix</title>
  <defs>
    <linearGradient id="rx-mark" x1="5" y1="5" x2="64" y2="67" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4F0FF"/>
      <stop offset="0.42" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="rx-word" x1="82" y1="20" x2="304" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.72" stop-color="#E7E9FF"/>
      <stop offset="1" stop-color="#BFC7FF"/>
    </linearGradient>
    <filter id="rx-glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#rx-glow)">
    <path
