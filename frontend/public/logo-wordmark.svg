<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 242 56" fill="none">
  <defs>
    <linearGradient id="wm-bolt" x1="24" y1="5" x2="24" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0eaff"/>
      <stop offset="40%" stop-color="#a86dff"/>
      <stop offset="100%" stop-color="#5500c8"/>
    </linearGradient>
    <filter id="wm-glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bolt icon at y=5 to vertically center the 46px-tall mark in 56px height -->
  <g transform="translate(0, 5)" filter="url(#wm-glow)">
    <path
